<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
    <link rel="stylesheet" href="../estilos/exercicio1.css">
</head>
<body>
    <main>
        <form id="formulario" action="respFormulario.html" method="post">
            <fieldset>
                <h2>Deixe um Comentário.</h2>
                <label for="lbNome">Nome:</label>
                <input type="text" id="ipNome" name="ipNome" required>
    
                <label for="lbEmail">Email:</label>
                <input type="email" id="iEmail" name="ipEmail" required>

                <label for="lbWebsite">Website:</label>
                <input type="url" id="iWebsite" name="ipWebsite" required>
    
                <label for="lbComentario">Comentário:</label>
                <textarea name="comentario" id="comentario" rows="S"></textarea>

                <h5>Observação: Seu comentário será publicado após passar pelo moderador.</h5>
                <input type="submit" value="Enviar Comentário">    
            </fieldset>

            </form>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../estilos/exercicio3.css">
    <title>Exercício 3</title>
</head>
<body>
    <main>
        <form id="formulario" action="respFormulario.html" method="post">
            <fieldset>
                <legend>Dados Pessoais</legend>
                <fieldset>
                    <legend>Detalhes do Endereço</legend>
                    <label for="lbEndereco">Cidade:</label>
                <input type="text" id="ipEndereco" name="ipEndereco" required>

                <label for="lbCep">CEP:</label>
                <input type="text" id="ipCep" name="ipCep" required>
                </fieldset>
                <fieldset>
                    <legend>Detalhes do Telefone</legend>
                    <label for="lbCasa">Casa:</label>
                <input type="tel" id="ipCasa" name="ipCasa" required>

                <label for="lbCelular">Celular:</label>
                <input type="tel" id="ipCelular" name="ipCelular" required>
                </fieldset>
            </fieldset>

        </form>
    </main>
    
</body>
</html>
